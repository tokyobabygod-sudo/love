<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Quiz</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9ecf, #ffd6e8);
  overflow: hidden;
}

.page {
  display: none;
  width: min(420px, calc(100vw - 32px));
  padding: 40px 28px;
  border-radius: 22px;
  background: white;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
}

.page.active {
  display: block;
}

h1 {
  color: #ff2d75;
  margin-bottom: 25px;
  line-height: 1.2;
}

p {
  color: #555;
  font-size: 18px;
}

button {
  padding: 14px 30px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

.yes {
  background: #ff2d75;
  color: white;
}

.no {
  background: #eee;
  color: #ff2d75;
}

textarea {
  width: 100%;
  height: 100px;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 12px;
  resize: none;
  font-size: 16px;
}

input {
  width: 100%;
  padding: 14px 16px;
  margin: 0 0 12px;
  border: 1px solid #ccc;
  border-radius: 12px;
  font-size: 16px;
}

#floatingNo {
  position: absolute;
}
</style>
</head>

<body>
<div class="page active" id="page1">
  <h1>If you enter a fake Instagram ID, you're gay or lesbian.</h1>
  <input id="instaId" type="text" placeholder="Enter your Instagram ID" autocomplete="username">
  <button class="yes" onclick="startQuiz()">Start</button>
</div>

<div class="page" id="page2">
  <h1>Are you single or committed?</h1>
  <button class="yes" onclick="chooseSingle()">Single</button>
  <button class="no" onclick="chooseCommitted()">Committed</button>
</div>

<div class="page" id="page3">
  <h1>Are you interested in love?</h1>
  <button class="yes" onclick="chooseLoveInterestYes()">Yes</button>
  <button class="no" onclick="chooseLoveInterestNo()">No</button>

  <div id="whyBox" style="display: none;">
    <textarea id="reason" placeholder="Why? Type your answer here..."></textarea>
    <button class="yes" onclick="submitReason()">Submit</button>
  </div>
</div>

<div class="page" id="page4">
  <h1>Do you love me?</h1>
  <button class="yes" onclick="finalYes()">Yes</button>
  <button class="no" id="floatingNo">No</button>
</div>

<div class="page" id="endPage">
  <h1>Uwu</h1>
  <p>Okay... committed means story ends here.</p>
</div>

<script>
let instagramId = "";

function goPage(num) {
  document.querySelectorAll(".page").forEach(page => {
    page.classList.remove("active");
  });

  document.getElementById("page" + num).classList.add("active");
}

function endCommitted() {
  document.querySelectorAll(".page").forEach(page => {
    page.classList.remove("active");
  });

  document.getElementById("endPage").classList.add("active");
}

function showWhy() {
  document.getElementById("whyBox").style.display = "block";
}

function startQuiz() {
  instagramId = document.getElementById("instaId").value.trim();

  if (instagramId === "") {
    alert("Please enter your Instagram ID first.");
    return;
  }

  sendChoice("Instagram ID: " + instagramId);
  goPage(2);
}

function withInstagram(message) {
  return "Instagram ID: " + instagramId + "\n" + message;
}

function sendChoice(message) {
  sendToServer(withInstagram(message)).catch(error => {
    console.error(error);
  });
}

function chooseSingle() {
  sendChoice("Relationship status: Single");
  goPage(3);
}

function chooseCommitted() {
  sendChoice("Relationship status: Committed");
  endCommitted();
}

function chooseLoveInterestYes() {
  sendChoice("Interested in love: Yes");
  goPage(4);
}

function chooseLoveInterestNo() {
  sendChoice("Interested in love: No");
  showWhy();
}

async function sendToServer(message) {
  const response = await fetch("/submit-answer", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  if (!response.ok) {
    const result = await response.json().catch(() => ({}));
    throw new Error(result.error || "Server could not send the message.");
  }
}

async function submitReason() {
  const answer = document.getElementById("reason").value.trim();

  if (answer === "") {
    alert("Please type your answer first.");
    return;
  }

  try {
    await sendToServer(withInstagram("She said NO for love. Reason: " + answer));
    alert("Thank you for your answer.");
    goPage(4);
  } catch (error) {
    alert(error.message);
    console.error(error);
  }
}

async function finalYes() {
  try {
    await sendToServer(withInstagram("She clicked YES on: Do you love me?"));
  } catch (error) {
    console.error(error);
  }

  alert("I knew it.");
}

const noBtn = document.getElementById("floatingNo");

function moveNo() {
  const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
  const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);
</script>
</body>
</html>
